<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原因特定テスト</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
    #debug-box { background: white; padding: 15px; border: 2px solid #ff4444; border-radius: 8px; margin-bottom: 20px; }
    pre { background: #222; color: #00ff00; padding: 10px; overflow-x: auto; border-radius: 4px; }
  </style>
</head>
<body>

  <div id="debug-box">
    <h2>🔍 届いたデータの診断結果</h2>
    <p>スプレッドシートから届いたデータの「1件目」を以下に表示しています：</p>
    <pre id="data-preview">データを読み込み中...</pre>
  </div>

  <script>
    // ⚠️ここに「一番新しい」GASのURLを貼り付けてください！
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyzdzm3tTgzU2M3286epwaERSFAKzZoLrdMzGzF6JSrvtWPR36KwExIxvVE_RaulrM9/exec'; 

    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        if (data.length === 0) {
          document.getElementById('data-preview').innerText = 'データが空っぽ（0件）です。';
          return;
        }
        
        // 届いたデータの1件目を、見やすい文字にして画面に表示する
        const firstRow = data[0];
        document.getElementById('data-preview').innerText = JSON.stringify(firstRow, null, 2);
      })
      .catch(err => {
        document.getElementById('data-preview').innerText = '通信エラー: ' + err;
      });
  </script>
</body>
</html>

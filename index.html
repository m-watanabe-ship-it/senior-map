<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シニア通いの場マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    .popup-title { font-size: 16px; margin: 0 0 5px 0; color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 3px; }
    .popup-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
    .popup-table td { padding: 4px 0; font-size: 13px; vertical-align: top; color: #555; }
    .popup-table td.label { font-weight: bold; width: 75px; color: #222; }
    .tel-btn { display: inline-block; background: #4CAF50; color: white !important; padding: 5px 10px; border-radius: 4px; text-decoration: none; margin-top: 5px; font-weight: bold; font-size: 12px; }
  </style>
</head>
<body>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1. 地図の初期設定（日本全体が見える位置）
    const map = L.map('map').setView([35.68, 139.76], 10);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // ⚠️ここにあなたの「一番新しい」GASのURLを貼り付けてください！
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyzdzm3tTgzU2M3286epwaERSFAKzZoLrdMzGzF6JSrvtWPR36KwExIxvVE_RaulrM9/exec'; 

    // 2. データの取得
    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        const markers = [];

        data.forEach(spot => {
          // 【★超強力安全装置】
          // 文字列として届いた緯度・経度を、ここで「確実に数字（Float）」に変換します
          const lat = parseFloat(spot.lat);
          const lng = parseFloat(spot.lng);

          // 変換した結果、まともな数字（エラーでない）場合だけピンを立てる
          if (!isNaN(lat) && !isNaN(lng)) {
            
            const telHtml = spot.tel ? `<a href="tel:${spot.tel}" class="tel-btn">📞 電話をかける</a>` : 'なし';

            const popupContent = `
              <h3 class="popup-title">🌸 ${spot.name || '名称未設定'}</h3>
              <table class="popup-table">
                <tr><td class="label">活動区分</td><td>${spot.type || '未設定'}</td></tr>
                <tr><td class="label">会場名</td><td>${spot.venue || '未設定'}</td></tr>
                <tr><td class="label">日時</td><td>${spot.datetime || '未設定'}</td></tr>
                <tr><td class="label">参加費</td><td>${spot.fee || '無料'}</td></tr>
                <tr><td class="label">対象者</td><td>${spot.target || 'どなたでも'}</td></tr>
                <tr><td class="label">バリアフリー</td><td>${spot.barrier_free || '情報なし'}</td></tr>
                <tr><td class="label">連絡先</td><td>${telHtml}</td></tr>
              </table>
            `;

            // ピンを地図に追加
            L.marker([lat, lng]).addTo(map).bindPopup(popupContent);
            markers.push([lat, lng]);
          }
        });

        // すべてのピンが画面に収まるように自動でズーム調整
        if (markers.length > 0) {
          map.fitBounds(markers);
        } else {
          alert('データは届きましたが、有効な緯度・経度の数字が見つかりませんでした。スプレッドシートの数字が半角であることを確認してください。');
        }
      })
      .catch(err => alert('データ読み込みエラー: ' + err));
  </script>
</body>
</html>

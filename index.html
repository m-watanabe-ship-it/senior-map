<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプルテスト</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>#map { width: 100vw; height: 100vh; margin: 0; }</style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 地図を東京中心で表示
    const map = L.map('map').setView([35.68, 139.76], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // ⚠️ここにあなたの本物のGASのURLを入れてください
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyzdzm3tTgzU2M3286epwaERSFAKzZoLrdMzGzF6JSrvtWPR36KwExIxvVE_RaulrM9/exec'; 

    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        data.forEach(spot => {
          // 色分けなし。標準の青いピンを立てるだけのシンプルな処理
          L.marker([spot.lat, spot.lng])
            .addTo(map)
            .bindPopup(`<b>${spot.name}</b>`);
        });
      })
      .catch(err => alert('データ読み込みエラー: ' + err));
  </script>
</body>
</html>

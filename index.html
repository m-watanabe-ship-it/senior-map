<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シニア通いの場マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    .popup-title { font-size: 16px; margin: 0 0 5px 0; color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 3px; }
    .popup-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
    .popup-table td { padding: 4px 0; font-size: 13px; vertical-align: top; color: #555; }
    .popup-table td.label { font-weight: bold; width: 75px; color: #222; }
    .tel-btn { display: inline-block; background: #4CAF50; color: white !important; padding: 5px 10px; border-radius: 4px; text-decoration: none; margin-top: 5px; font-weight: bold; font-size: 12px; }
  </style>
</head>
<body>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1. 【変更】初期位置を「燕市役所付近（緯度: 37.6653, 経度: 138.8927）」に設定
    // 最後の「13」はズーム倍率です（数字が大きいほど拡大されます）
    const map = L.map('map').setView([37.6653, 138.8927], 13);
    
    // 2. 【変更】地図データを、信頼性の高い「国土地理院地図」に変更
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
      attribution: '<a>国土地理院</a>'
    }).addTo(map);

    // ⚠️ここにあなたの「一番新しい」GASのURLを貼り付けてください！
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyzdzm3tTgzU2M3286epwaERSFAKzZoLrdMzGzF6JSrvtWPR36KwExIxvVE_RaulrM9/exec'; 

    // 3. データの取得
    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        const markers = [];

        data.forEach(spot => {
          const values = Object.values(spot);
          
          const name = values[0] || '名称未設定';
          const lat = parseFloat(values[1]); 
          const lng = parseFloat(values[2]); 
          const type = values[3] || '未設定';
          const venue = values[4] || '未設定';
          const datetime = values[5] || '未設定';
          const fee = values[6] || '無料';
          const target = values[7] || 'どなたでも';
          const tel = values[8] || '';
          const barrier_free = values[9] || '情報なし';

          if (!isNaN(lat) && !isNaN(lng)) {
            
            const telHtml = tel ? `<a href="tel:${tel}" class="tel-btn">📞 電話をかける</a>` : 'なし';

            const popupContent = `
              <h3 class="popup-title">🌸 ${name}</h3>
              <table class="popup-table">
                <tr><td class="label">活動区分</td><td>${type}</td></tr>
                <tr><td class="label">会場名</td><td>${venue}</td></tr>
                <tr><td class="label">日時</td><td>${datetime}</td></tr>
                <tr><td class="label">参加費</td><td>${fee}</td></tr>
                <tr><td class="label">対象者</td><td>${target}</td></tr>
                <tr><td class="label">バリアフリー</td><td>${barrier_free}</td></tr>
                <tr><td class="label">連絡先</td><td>${telHtml}</td></tr>
              </table>
            `;

            L.marker([lat, lng]).addTo(map).bindPopup(popupContent);
            markers.push([lat, lng]);
          }
        });

        // スプレッドシートにデータがある場合は、ピンが全部収まる位置に自動調整。
        // データがまだ少ないうちは、上で設定した「燕市役所中心」が優先されます。
        if (markers.length > 0) {
          map.fitBounds(markers);
        }
      })
      .catch(err => alert('データ読み込みエラー: ' + err));
  </script>
</body>
</html>

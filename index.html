<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シニア通いの場マップ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4CAF50">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    /* ポップアップ内の文字サイズやボタン調整 */
    .popup-title { font-size: 16px; margin: 0 0 5px 0; color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 3px; }
    .popup-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
    .popup-table td { padding: 4px 0; font-size: 13px; vertical-align: top; color: #555; }
    .popup-table td.label { font-weight: bold; width: 75px; color: #222; }
    .tel-btn { display: inline-block; background: #4CAF50; color: white !important; padding: 5px 10px; border-radius: 4px; text-decoration: none; margin-top: 5px; font-weight: bold; font-size: 12px; }
  </style>
</head>
<body>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // --- 1. Service Workerの登録 ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => console.log('PWA Ready'));
    }

    // --- 2. 地図の初期化 (初期位置: 日本全体、データ読込後に自動調整) ---
    const map = L.map('map').setView([35.68, 139.76], 11);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // --- 3. 活動区分ごとにピンの色を変える設定 ---
    function getIconColor(type) {
      if (type.includes('サロン')) return 'red';
      if (type.includes('体操') || type.includes('運動')) return 'green';
      if (type.includes('趣味') || type.includes('サークル')) return 'orange';
      return 'blue'; // どれにも当てはまらない場合
    }

    function createCustomIcon(color) {
      return new L.Icon({
        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
      });
    }

    // --- 4. GASからリアルタイムデータ取得（オフライン対応） ---
    // ⚠️重要：ここにステップ2で取得したあなたのGASウェブアプリURLを貼り付けてください！
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzb3Ng0DDiOYwQ09pEKfHWJ9nlpecVSQ4IqT0os7176ELx24A_bOqvOqcP_1pXzroBa/exec'; 

    fetch(GAS_URL)
      .then(res => {
        if (!res.ok) throw new Error('Network error');
        return res.json();
      })
      .then(data => {
        localStorage.setItem('cachedMapData', JSON.stringify(data)); // オンライン時に最新を保存
        renderMarkers(data);
      })
      .catch(() => {
        console.log('オフラインモード：キャッシュデータから描画します');
        const cached = localStorage.getItem('cachedMapData');
        if (cached) renderMarkers(JSON.parse(cached));
      });

    // --- 5. マーカーとポップアップの描画 ---
    function renderMarkers(data) {
      const markers = [];

      data.forEach(spot => {
        const color = getIconColor(spot.type || '');
        const customIcon = createCustomIcon(color);

        // 電話番号リンクの生成（データがある場合のみ）
        const telHtml = spot.tel ? `<a href="tel:${spot.tel}" class="tel-btn">📞 電話をかける</a>` : 'なし';

        // ポップアップの中身をHTMLで構築
        const popupContent = `
          <h3 class="popup-title">🌸 ${spot.name}</h3>
          <table class="popup-table">
            <tr><td class="label">活動区分</td><td>${spot.type || '未設定'}</td></tr>
            <tr><td class="label">会場名</td><td>${spot.venue || '未設定'}</td></tr>
            <tr><td class="label">日時</td><td>${spot.datetime || '未設定'}</td></tr>
            <tr><td class="label">参加費</td><td>${spot.fee || '無料'}</td></tr>
            <tr><td class="label">対象者</td><td>${spot.target || 'どなたでも'}</td></tr>
            <tr><td class="label">バリアフリー</td><td>${spot.barrier_free || '情報なし'}</td></tr>
            <tr><td class="label">連絡先</td><td>${telHtml}</td></tr>
          </table>
        `;

        const marker = L.marker([spot.lat, spot.lng], { icon: customIcon })
          .addTo(map)
          .bindPopup(popupContent);
        
        markers.push([spot.lat, spot.lng]);
      });

      // 全てのピンが綺麗に画面に収まるように地図の表示範囲を自動調整
      if (markers.length > 0) {
        map.fitBounds(markers);
      }
    }
  </script>
</body>
</html>
